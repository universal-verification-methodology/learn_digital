title: Tri-state / bus
footer: learn_digital — tri state bus
slides:
- type: title
  title: Tri-state / bus
  subtitle: A shared bus lets several drivers connect to one wire, but only one should
    drive at a time
  notes: A shared bus lets several drivers connect to one wire—but only one should
    drive at a time. With enable off, the driver is high-Z, disconnected from the
    net. With enable on, it drives zero or one. No active driver means float Z, unless
    a pull-up or pull-down resistor defines idle level. Two enabled drivers with different
    data fight and the bus reads X. This module makes resolution rules concrete.
- type: bullets
  title: Enable, float, fight
  bullets:
  - 'Starter case: driver A enabled with data one, B and C off, the bus is one'
  - Turn all enables off with no pull and the bus is Z
  - Enable B with zero while A still drives one and you get contention X
  - Two drivers on the same value may still show that bit
  - 'Safe protocol: exactly one enable high, often one-hot output-enable in real designs'
  notes: 'Starter case: driver A enabled with data one, B and C off—the bus is one.
    Turn all enables off with no pull and the bus is Z. Enable B with zero while A
    still drives one and you get contention X. Two drivers on the same value may still
    show that bit, but overlapping enables is unsafe practice. Safe protocol: exactly
    one enable high—often one-hot output-enable in real designs.'
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: Tri-state bus starter
  notes: 'In the browser lab, look at three pieces: the challenge panel, the driver
    toggles and bus readout, and the schematic. Load the starter—only A drives one,
    bus equals one. Try all off for Z, force contention, or set pull-up on a float.
    Hit Explain resolution to see the verdict trace. Use Check when a challenge looks
    done.'
- type: bullets
  title: Workbook practice
  bullets:
  - In the workbook track, fill a small table
  - Sketch three tri-state buffers on one bus line with enable pins
  - With all enables low and pull-up on, what is the bus?
  - 'Name one pitfall: enabling two drivers at once on an external bus'
  notes: 'In the workbook track, fill a small table: all off, one driver on, two drivers
    agree, two drivers fight. Sketch three tri-state buffers on one bus line with
    enable pins. With all enables low and pull-up on, what is the bus? Name one pitfall:
    enabling two drivers at once on an external bus.'
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not treat multi-drive same value as safe, it still violates one-driver discipline
  - Internal FPGA fabrics often prefer muxes over tri-state
  - 'And remember: the browser lab is literacy'
  - Real boards still need OE timing, bus holders, and protocol rules beyond this
    toy resolver
  notes: 'Do not treat multi-drive same value as safe—it still violates one-driver
    discipline. Internal FPGA fabrics often prefer muxes over tri-state. And remember:
    the browser lab is literacy. Real boards still need OE timing, bus holders, and
    protocol rules beyond this toy resolver.'
- type: bullets
  title: Your turn
  bullets:
