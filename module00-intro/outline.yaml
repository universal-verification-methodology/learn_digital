title: Welcome to digital foundations
footer: learn_digital — intro
slides:
- type: title
  title: Welcome to digital foundations
  subtitle: Digital chips speak in bits, gates, clocks, and state
  notes: Digital chips speak in bits, gates, clocks, and state. Before you write Verilog,
    you need those ideas in your bones. This short clip welcomes you to learn digital—the
    foundations course—and shows how the two practice tracks work.
- type: bullets
  title: What you’ll build toward
  bullets:
  - Across the course you’ll move from numbers and encodings
  - You are not learning a hardware language yet
  - Coding in Verilog and SystemVerilog comes later
  - Here you learn the concepts those languages describe
  notes: Across the course you’ll move from numbers and encodings, through Boolean
    logic and gates, into clocks and state machines, then datapath and memory. You
    are not learning a hardware language yet. Coding in Verilog and SystemVerilog
    comes later. Here you learn the concepts those languages describe.
- type: bullets
  title: Two tracks, one idea
  bullets:
  - Every lab module offers two ways to practice
  - The workbook track is paper or notes
  - The browser lab track uses interactive tools on the learning platform for quick
    feedback
  - You may do either track, or both
  - A good rhythm is browser first for the idea, then a paper sketch to harden it
  notes: 'Every lab module offers two ways to practice. The workbook track is paper
    or notes: truth tables, encodings, timing sketches you can redo without a browser.
    The browser lab track uses interactive tools on the learning platform for quick
    feedback and visual intuition. You may do either track, or both. A good rhythm
    is browser first for the idea, then a paper sketch to harden it.'
- type: bullets
  title: Set up the workbook track
  bullets:
  - Grab a notebook or tablet
  - That is the whole setup for the workbook track
  - When a module asks you to sketch a table or a timing diagram, do it by hand
  - Stretch reading in the older combined digital-and-Verilog materials is optional
  notes: Grab a notebook or tablet. That is the whole setup for the workbook track.
    When a module asks you to sketch a table or a timing diagram, do it by hand. Stretch
    reading in the older combined digital-and-Verilog materials is optional—not required
    for this path.
- type: two_column
  title: Set up the browser lab track
  left:
  - From the monorepo
  - That index is the map of interactive labs you’ll use later
  - If you prefer, use the published tools site instead
  - Confirm you can reach the tools page, the next module will send you into a specific
    lab
  right: assets/tools-index.png
  notes: From the monorepo, serve the platform folder with a simple local web server,
    then open the tools index in your browser. That index is the map of interactive
    labs you’ll use later. If you prefer, use the published tools site instead. Either
    way, confirm you can reach the tools page—the next module will send you into a
    specific lab.
- type: bullets
  title: How to move through modules
  bullets:
  - For each module
  - When you finish this intro checklist, continue to the first lab
  notes: 'For each module, read the README for the outcome, pick a track—or both—then
    work the checklist. When you finish this intro checklist, continue to the first
    lab: radix and bit width, where number bases become something you can convert
    with confidence.'
