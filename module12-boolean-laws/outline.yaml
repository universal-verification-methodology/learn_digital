title: Boolean laws
footer: learn_digital — boolean laws
slides:
- type: title
  title: Boolean laws
  subtitle: Algebra lets you simplify logic before you draw gates
  notes: Algebra lets you simplify logic before you draw gates. De Morgan swaps negation
    over AND and OR. Absorption drops redundant terms. Complement says A plus not-A
    is one. This module makes step-by-step rewrites concrete—not just names on a cheat
    sheet.
- type: bullets
  title: Rewrite with a reason
  bullets:
  - 'Each click should name the law: not of A and B becomes not-A or not-B'
  - A plus A-and-B collapses to A
  - A and not-A is zero
  - Double negation peels to A
  - Factor A-and-B plus A-and-C into A-and the sum of B and C
  - The history list shows your proof chain; Undo when a step goes wrong
  notes: 'Each click should name the law: not of A and B becomes not-A or not-B. A
    plus A-and-B collapses to A. A and not-A is zero. Double negation peels to A.
    Factor A-and-B plus A-and-C into A-and the sum of B and C. The history list shows
    your proof chain; Undo when a step goes wrong.'
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: Boolean laws starter
  notes: 'In the browser lab, look at three pieces: the challenge panel, the expression
    stage with rewrite buttons, and the law reference chips. Load the starter for
    not of A and B. Apply De Morgan until you reach not-A or not-B. Try absorption,
    complement, and factor challenges from the catalog. Use Check when a challenge
    looks done.'
- type: bullets
  title: Workbook practice
  bullets:
  - In the workbook track, simplify not of A or B by De Morgan
  - Collapse A plus A-and-B to A
  - Show A-and-not-A is zero and A-or-not-A is one
  - Factor A-B plus A-C by hand
  - 'Name one pitfall: distributing a NOT only over part of a term'
  notes: 'In the workbook track, simplify not of A or B by De Morgan. Collapse A plus
    A-and-B to A. Show A-and-not-A is zero and A-or-not-A is one. Factor A-B plus
    A-C by hand. Name one pitfall: distributing a NOT only over part of a term.'
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not treat AND and OR as ordinary arithmetic, De Morgan flips both operator
    and negation
  - Skipping steps can hide an illegal rewrite
  - 'And remember: the browser lab is literacy'
  - Real synthesis still needs consistent don't-care and timing context
  notes: 'Do not treat AND and OR as ordinary arithmetic—De Morgan flips both operator
    and negation. Skipping steps can hide an illegal rewrite. And remember: the browser
    lab is literacy. Real synthesis still needs consistent don''t-care and timing
    context.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - In the browser, finish a few challenges after the starter
  - On paper, do two rewrites with the law named beside each step
  - When you are ready, take the short quiz, then continue to K-maps
