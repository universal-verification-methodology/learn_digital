title: XOR parity tree
footer: learn_digital — xor parity tree
slides:
- type: title
  title: XOR parity tree
  subtitle: Parity counts whether the number of ones is even or odd
  notes: 'Parity counts whether the number of ones is even or odd. Reduce XOR folds
    every bit with xor: odd count of ones gives one, even gives zero. You can fold
    left to right in a chain or pair bits in a balanced tree—XOR is associative, so
    both give the same answer. A tree needs about log N stages; a chain needs N minus
    one. Hardware parity generators prefer trees for timing. This module makes reduce
    XOR and tree depth concrete.'
- type: bullets
  title: Fold, depth, even and odd
  bullets:
  - Four-bit one-zero-one-zero has two ones, so reduce XOR equals zero
  - Level one pairs one xor zero and one xor zero to get one-one
  - Tree depth for four bits is two; chain depth is three
  - Even parity bit equals reduce XOR; odd parity is the inverse
  - Flip any single bit and parity toggles
  - An odd leftover at a tree level promotes unchanged to the next row
  notes: Four-bit one-zero-one-zero has two ones, so reduce XOR equals zero. Level
    one pairs one xor zero and one xor zero to get one-one; level two xors those to
    root zero. Tree depth for four bits is two; chain depth is three. Even parity
    bit equals reduce XOR; odd parity is the inverse. Flip any single bit and parity
    toggles. An odd leftover at a tree level promotes unchanged to the next row.
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: XOR parity tree starter
  notes: 'In the browser lab, look at three pieces: the challenge panel, the bit row
    and XOR tree diagram, and the parity readouts. Load the starter—four bits one-zero-one-zero,
    reduce XOR equals zero, tree depth two versus chain depth three. Step tree levels
    or reveal the full tree, then compare depths. Use Check when a challenge looks
    done.'
- type: bullets
  title: Workbook practice
  bullets:
  - In the workbook track, reduce-xor the bits one-one-zero-one by hand
  - Draw a balanced tree for eight bits and state tree depth versus chain depth
  - For reduce XOR equals one, give even and odd parity bits
  - 'Name one pitfall: building a long XOR chain when a tree would meet timing'
  notes: 'In the workbook track, reduce-xor the bits one-one-zero-one by hand. Draw
    a balanced tree for eight bits and state tree depth versus chain depth. For reduce
    XOR equals one, give even and odd parity bits. Name one pitfall: building a long
    XOR chain when a tree would meet timing.'
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not confuse even parity with odd parity, one is the complement of the other
  - Tree and chain must agree on the final bit, but not on delay
  - 'And remember: the browser lab is literacy'
  - Real links still need generator polynomials, multi-bit ECC
  notes: 'Do not confuse even parity with odd parity—one is the complement of the
    other. Tree and chain must agree on the final bit, but not on delay. And remember:
    the browser lab is literacy. Real links still need generator polynomials, multi-bit
    ECC, and on-wire framing beyond a single parity bit.'
