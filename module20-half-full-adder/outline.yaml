title: Half / full adder
footer: learn_digital — half full adder
slides:
- type: title
  title: Half / full adder
  subtitle: Addition starts with a half adder
  notes: 'Addition starts with a half adder: sum is A xor B, carry is A and B—but
    there is no carry-in, so it cannot sit alone in a multi-bit column. A full adder
    adds carry-in: sum is A xor B xor Cin, carry-out is majority of the three inputs.
    Two half adders plus an OR on the carries build a full adder. Chain full adders
    and you get ripple-carry addition. This module makes all three levels concrete.'
- type: bullets
  title: Sum, carry, chain
  bullets:
  - Half adder truth
  - Full adder with A, B, and Cin all one gives sum one and carry-out one, majority
    wins
  - Compose view
  - Ripple two bits
  notes: 'Half adder truth: zero plus zero gives sum zero, carry zero; one plus one
    gives sum zero, carry one. Full adder with A, B, and Cin all one gives sum one
    and carry-out one—majority wins. Compose view: first HA on A and B yields S one
    and C one; second HA on S one and Cin yields sum one and another carry; Cout is
    C one or C two. Ripple two bits: FA zero adds the least column with Cin zero;
    FA one takes the carry into the next column.'
- type: image
  title: Browser lab
  image: assets/lab-starter.png
  caption: Half full adder starter
  notes: 'In the browser lab, look at three pieces: the challenge panel, the adder
    diagram and truth table, and the input toggles. Load the starter—a half adder
    with A equals one, B equals one, so S equals zero and C equals one. Switch to
    full adder, compose, or ripple mode and hit Explain to see the step trace. Use
    Check when a challenge looks done.'
- type: bullets
  title: Workbook practice
  bullets:
  - In the workbook track, fill the half-adder truth table for all four A-B pairs
  - For full adder A equals one, B equals zero, Cin equals one, give S and Cout
  - Sketch two half adders and an OR as one full adder
  - For two-bit ripple with A equals one-zero and B equals one-one, name S zero, S
    one
  - 'Name one pitfall: using a half adder where a column needs carry-in'
  notes: 'In the workbook track, fill the half-adder truth table for all four A-B
    pairs. For full adder A equals one, B equals zero, Cin equals one, give S and
    Cout. Sketch two half adders and an OR as one full adder. For two-bit ripple with
    A equals one-zero and B equals one-one, name S zero, S one, and final Cout. Name
    one pitfall: using a half adder where a column needs carry-in.'
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Do not confuse half-adder carry with full-adder carry-out, they solve different
    problems
  - Majority carry is not the same as HA carry alone when Cin is in play
  - 'And remember: the browser lab is literacy'
  - Real adders still need timing, overflow flags
  notes: 'Do not confuse half-adder carry with full-adder carry-out—they solve different
    problems. Majority carry is not the same as HA carry alone when Cin is in play.
    And remember: the browser lab is literacy. Real adders still need timing, overflow
    flags, and faster carry schemes beyond naive ripple.'
- type: bullets
  title: Your turn
  bullets:
